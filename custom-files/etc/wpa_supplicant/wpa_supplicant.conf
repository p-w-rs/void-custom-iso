ctrl_interface=/var/run/wpa_supplicant
update_config=1
eapol_version=1
ap_scan=1
fast_reauth=1

# Add networks after first boot with:
#   wpa_passphrase SSID PASS | sudo tee -a /etc/wpa_supplicant/wpa_supplicant.conf
#
# Example network block:
# network={
#     ssid="MyNetwork"
#     psk=<hashed value from wpa_passphrase>
# }
