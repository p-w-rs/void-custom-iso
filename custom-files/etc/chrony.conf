# /etc/chrony.conf — default NTP configuration
# Uses the Void Linux default NTP pool.
# After changes: sv restart chronyd

# ── Time sources ──────────────────────────────────────────────────────────────
pool pool.ntp.org iburst

# ── Clock discipline ──────────────────────────────────────────────────────────
# Allow stepping the clock on first start if offset is large
makestep 1.0 3

# Keep time across reboots using a drift file
driftfile /var/lib/chrony/drift

# Record last sync time
rtcsync
